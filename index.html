<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SalahGuard Legal Pages</title>
  <style>
    :root { color-scheme: light; --bg: #f7f4ec; --card: #ffffff; --text: #171713; --muted: #666154; --border: #e4ddcf; --accent: #1b6b4a; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    main { width: min(880px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 28px; box-shadow: 0 16px 40px rgba(30, 26, 18, 0.06); }
    h1 { margin: 0 0 12px; font-size: clamp(32px, 6vw, 48px); line-height: 1.05; letter-spacing: -0.04em; }
    p { margin: 0 0 18px; color: var(--muted); }
    ul { margin: 24px 0 0; padding: 0; list-style: none; display: grid; gap: 12px; }
    a { display: block; padding: 16px 18px; border: 1px solid var(--border); border-radius: 16px; color: var(--accent); text-decoration: none; font-weight: 700; background: #fbfaf6; }
    a:hover { border-color: var(--accent); }
    footer { margin-top: 24px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>SalahGuard Legal Pages</h1>
      <p>Static legal pages for SalahGuard.</p>
      <ul>
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="terms.html">Terms of Service</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="delete-account.html">Delete Account</a></li>
      </ul>
    </section>
    <footer>No cookies. No tracking. Static HTML only.</footer>
  </main>
</body>
</html>
